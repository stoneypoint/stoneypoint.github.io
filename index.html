<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StoneyPoint</title>
    <meta
      name="description"
      content="StoneyPoint makes simple apps for everyday life."
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@700&family=Open+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <main class="site-shell">
      <section class="profile" aria-labelledby="site-title">
        <img
          class="profile-image"
          src="logo.png"
          alt="StoneyPoint logo"
          data-i18n-attr="alt:logoAlt"
        />
        <h1 id="site-title">StoneyPoint</h1>
        <p class="profile-copy" data-i18n="profileCopy">
          We make simple apps for everyday life.
        </p>

        <nav
          class="text-links"
          aria-label="Contact links"
          data-i18n-attr="aria-label:contactLinksLabel"
        >
          <a
            href="mailto:contact@stoney-point.com"
            aria-label="Email"
            data-i18n-attr="aria-label:emailLabel"
          >
            <i class="fa-solid fa-envelope" aria-hidden="true"></i>
          </a>
          <a
            href="https://apps.apple.com/developer/stoneypoint/id1864793728"
            target="_blank"
            rel="noreferrer"
            aria-label="App Store profile"
            data-i18n-attr="aria-label:appStoreProfileLabel"
          >
            <i class="fa-brands fa-app-store-ios" aria-hidden="true"></i>
          </a>
          <a
            href="https://www.threads.com/@stnyptlog"
            target="_blank"
            rel="noreferrer"
            aria-label="Threads"
          >
            <i class="fa-brands fa-threads" aria-hidden="true"></i>
          </a>
        </nav>
      </section>

      <section
        id="apps"
        class="app-list"
        aria-label="StoneyPoint apps"
        data-i18n-attr="aria-label:appsLabel"
      >
        <a
          class="app-link app-link--labeled"
          href="https://apps.apple.com/app/labeled-organize-with-labels/id6758290807"
          target="_blank"
          rel="noreferrer"
        >
          <span class="app-intro">
            <img src="./labeled/app-icon.png" alt="" class="app-icon" />
            <span class="app-copy">
              <span class="app-title">Labeled</span>
              <span class="app-subtitle" data-i18n="labeledSubtitle">
                A to-do app built around labels.
              </span>
            </span>
          </span>
          <span class="app-cta" data-i18n="appStoreCta">
            View on App Store
            <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
          </span>
        </a>

        <a
          class="app-link app-link--blocus"
          href="https://apps.apple.com/app/blocus/id6759152876"
          target="_blank"
          rel="noreferrer"
        >
          <span class="app-intro">
            <img src="./blocus/app-icon.png" alt="" class="app-icon" />
            <span class="app-copy">
              <span class="app-title">Blocus</span>
              <span class="app-subtitle" data-i18n="blocusSubtitle">
                Organize goals, ideas, and tasks into blocks.
              </span>
            </span>
          </span>
          <span class="app-cta" data-i18n="appStoreCta">
            View on App Store
            <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
          </span>
        </a>

        <a
          class="app-link app-link--achievo"
          href="https://apps.apple.com/app/achievo-small-wins/id6761452248"
          target="_blank"
          rel="noreferrer"
        >
          <span class="app-intro">
            <img src="./achievo/app-icon.png" alt="" class="app-icon" />
            <span class="app-copy">
              <span class="app-title">Achievo</span>
              <span class="app-subtitle" data-i18n="achievoSubtitle">
                A journal for your small wins.
              </span>
            </span>
          </span>
          <span class="app-cta" data-i18n="appStoreCta">
            View on App Store
            <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
          </span>
        </a>
      </section>

      <footer class="footer">
        <p class="footer-copy">© <span id="year"></span> StoneyPoint</p>
        <div
          class="language-switcher"
          aria-label="Language"
          data-i18n-attr="aria-label:languageSwitcherLabel"
          data-language-switcher
        >
          <button
            class="language-option"
            type="button"
            data-locale-option="ko"
            aria-pressed="false"
          >
            한국어
          </button>
          <span class="language-divider" aria-hidden="true">|</span>
          <button
            class="language-option"
            type="button"
            data-locale-option="en"
            aria-pressed="false"
          >
            English
          </button>
        </div>
      </footer>
    </main>

    <script>
      const localeStorageKey = "stoneyPointLocale";
      const availableLocales = ["en", "ko"];
      const copy = {
        en: {
          metaDescription: "StoneyPoint makes simple apps for everyday life.",
          logoAlt: "StoneyPoint logo",
          contactLinksLabel: "Contact links",
          emailLabel: "Email",
          appStoreProfileLabel: "App Store profile",
          appsLabel: "StoneyPoint apps",
          languageSwitcherLabel: "Language",
          profileCopy: "We make simple apps for everyday life.",
          labeledSubtitle: "A to-do app built around labels.",
          blocusSubtitle: "Organize goals, ideas, and tasks into blocks.",
          achievoSubtitle: "A journal for your small wins.",
          appStoreCta: "View on App Store",
        },
        ko: {
          metaDescription:
            "StoneyPoint는 일상에 도움이 되는 간단한 앱을 만듭니다.",
          logoAlt: "StoneyPoint 로고",
          contactLinksLabel: "연락처 링크",
          emailLabel: "이메일",
          appStoreProfileLabel: "App Store 프로필",
          appsLabel: "StoneyPoint 앱",
          languageSwitcherLabel: "언어",
          profileCopy: "일상에 도움이 되는 간단한 앱을 만듭니다.",
          labeledSubtitle: "라벨을 중심으로 정리하는 할 일 관리 앱",
          blocusSubtitle: "목표, 아이디어, 할 일을 블록으로 정리하는 앱",
          achievoSubtitle: "작은 성공을 기록하는 저널",
          appStoreCta: "App Store에서 보기",
        },
      };

      const getStoredLocale = () => {
        try {
          const storedLocale = localStorage.getItem(localeStorageKey);
          return availableLocales.includes(storedLocale) ? storedLocale : null;
        } catch {
          return null;
        }
      };

      const getBrowserLocale = () => {
        const browserLanguages =
          navigator.languages && navigator.languages.length
            ? navigator.languages
            : [navigator.language];
        const preferredLanguage = (browserLanguages[0] || "").toLowerCase();

        return preferredLanguage.startsWith("ko") ? "ko" : "en";
      };

      const setStoredLocale = (locale) => {
        try {
          localStorage.setItem(localeStorageKey, locale);
        } catch {
          return;
        }
      };

      const applyLocale = (locale) => {
        const localizedCopy = copy[locale];
        const metaDescription = document.querySelector(
          'meta[name="description"]',
        );

        document.documentElement.lang = locale;

        if (metaDescription) {
          metaDescription.setAttribute(
            "content",
            localizedCopy.metaDescription,
          );
        }

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          const key = element.dataset.i18n;
          const textNode = Array.from(element.childNodes).find(
            (node) => node.nodeType === Node.TEXT_NODE,
          );

          if (textNode && localizedCopy[key]) {
            textNode.textContent = localizedCopy[key];
          }
        });

        document.querySelectorAll("[data-i18n-attr]").forEach((element) => {
          element.dataset.i18nAttr.split(",").forEach((pair) => {
            const [attribute, key] = pair.split(":");

            if (attribute && localizedCopy[key]) {
              element.setAttribute(attribute, localizedCopy[key]);
            }
          });
        });

        document.querySelectorAll("[data-locale-option]").forEach((button) => {
          const isActive = button.dataset.localeOption === locale;
          button.setAttribute("aria-pressed", String(isActive));
        });
      };

      document.querySelectorAll("[data-locale-option]").forEach((button) => {
        button.addEventListener("click", () => {
          const locale = button.dataset.localeOption;

          if (!availableLocales.includes(locale)) {
            return;
          }

          setStoredLocale(locale);
          applyLocale(locale);
        });
      });

      applyLocale(getStoredLocale() || getBrowserLocale());

      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
